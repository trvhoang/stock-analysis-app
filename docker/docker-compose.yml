version: '3.8'

services:
  db:
    image: postgres:16-alpine  # ✅ Use PostgreSQL 16 (stable, avoids 18+ mount issues)
    container_name: stock_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata  # ✅ Explicit data directory
    env_file:
      - ../.env  # ✅ Load from root .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql  # ✅ FIXED: Mount parent directory for PG 18+ compatibility
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s  # ✅ Give DB time to initialize
    restart: unless-stopped
    networks:
      - stock-network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: stock_app
    depends_on:
      db:
        condition: service_healthy  # ✅ Wait for DB to be ready
    ports:
      - "${APP_PORT:-8501}:8501"
      - "${API_PORT:-8000}:8000"  # ✅ FastAPI port (if you're using it)
    volumes:
      # ⚠️ Development mode: live code reload
      - ../app:/app:ro  # :ro = read-only for security
      - ../data:/data
      # ✅ Cache directories for better performance
      - app-cache:/home/appuser/.cache
      - streamlit-cache:/home/appuser/.streamlit
    environment:
      # ✅ Override with container-specific values
      POSTGRES_HOST: db  # ✅ Use service name, not localhost
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
    env_file:
      - ../.env  # ✅ Load from root .env (same as db)
    restart: unless-stopped
    networks:
      - stock-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres-data:
    driver: local
    name: stock_postgres_data  # ✅ Named volume for easy identification
  app-cache:
    driver: local
    name: stock_app_cache
  streamlit-cache:
    driver: local
    name: stock_streamlit_cache

networks:
  stock-network:
    driver: bridge
    name: stock_network